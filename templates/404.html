<!-- templates/404.html -->
{% extends "base.html" %}

{% block title %}404 — Страница не найдена{% endblock %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 3rem 1rem;">
    <div class="error-code" style="font-size: 6rem; font-weight: bold; color: #ffc107; margin-bottom: 1rem;">404</div>
    <div class="error-message" style="font-size: 1.5rem; margin-bottom: 1rem;">
        🔍 Страница не найдена
    </div>
    <div class="error-description" style="margin-bottom: 2rem; color: #6c757d;">
        К сожалению, такой страницы не существует. Проверьте адрес или вернитесь на главную.
    </div>
    <a href="/dashboard" class="btn btn-primary" style="display: inline-block; padding: 0.5rem 1rem; background-color: #007bff; color: white; text-decoration: none; border-radius: 0.25rem;">
        🏠 Вернуться на главную
    </a>
</div>
{% endblock %}
