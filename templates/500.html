<!-- templates/500.html -->
{% extends "base.html" %}

{% block title %}500 — Ошибка сервера{% endblock %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 3rem 1rem;">
    <div class="error-code" style="font-size: 6rem; font-weight: bold; color: #dc3545; margin-bottom: 1rem;">500</div>
    <div class="error-message" style="font-size: 1.5rem; margin-bottom: 1rem;">
        😞 Внутренняя ошибка сервера
    </div>
    <div class="error-description" style="margin-bottom: 2rem; color: #6c757d;">
        Что-то пошло не так с нашей стороны. Мы уже работаем над исправлением.
    </div>
    <a href="/" class="btn btn-primary" style="display: inline-block; padding: 0.5rem 1rem; background-color: #007bff; color: white; text-decoration: none; border-radius: 0.25rem;">
        🔄 Вернуться на главную
    </a>
</div>
{% endblock %}
