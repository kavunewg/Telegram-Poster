<!-- templates/base_login.html -->
<!DOCTYPE html>
<html lang="{{ get_lang(request) }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Poster{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #ec4899;
            --secondary: #f472b6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            
            --bg-dark: #fbf1fa;
            --bg-darker: #f6e6f4;
            --bg-card: #ffffff;
            
            --gradient-primary: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --gradient-bg: linear-gradient(168deg, #f8eefa 0%, #f0deef 48%, #e5cfe9 100%);
            
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(180, 115, 190, 0.25);
            --card-border-hover: rgba(180, 115, 190, 0.5);
            
            --text-primary: #241a33;
            --text-secondary: #473760;
            --text-muted: #7f7493;
            --text-disabled: #9b92ad;
            
            --input-bg: rgba(255, 255, 255, 0.92);
            --input-border: rgba(180, 115, 190, 0.35);
            --input-border-focus: #8b5cf6;
            
            --error-bg: rgba(239, 68, 68, 0.15);
            --error-border: #ef4444;
        }

        body.light-theme {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            
            --bg-dark: #f5f7fa;
            --bg-darker: #eef2f3;
            --bg-card: #ffffff;
            
            --gradient-bg: linear-gradient(135deg, #f5f7fa 0%, #eef2f3 100%);
            
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(0, 0, 0, 0.1);
            --card-border-hover: rgba(99, 102, 241, 0.3);
            
            --text-primary: #1f2937;
            --text-secondary: #374151;
            --text-muted: #6b7280;
            --text-disabled: #9ca3af;
            
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --input-border-focus: #6366f1;
            
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: rotateBg 60s linear infinite;
        }

        body.light-theme::before {
            opacity: 0.5;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Анимированные частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* Контейнер */
        .login-container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        /* Карточка */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-card:hover {
            border-color: var(--card-border-hover);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 40px rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Шапка */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-animation {
            margin-bottom: 20px;
        }

        .logo-pulse {
            font-size: 64px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0 rgba(99, 102, 241, 0));
            }
            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
            }
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Кнопки управления */
        .header-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 24px;
        }

        .theme-toggle, .lang-toggle {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Форма */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 16px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--input-border-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: var(--card-bg);
        }

        input:focus + .input-icon {
            color: var(--primary);
        }

        input::placeholder {
            color: var(--text-disabled);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            transition: all 0.3s;
            padding: 0;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* Кнопка входа */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-arrow {
            transition: transform 0.3s ease;
        }

        .login-btn:hover .btn-arrow {
            transform: translateX(4px);
        }

        /* Ошибка */
        .error-message {
            background: var(--error-bg);
            border-left: 4px solid var(--error-border);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            color: var(--danger);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Ссылка регистрации */
        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--card-border);
        }

        .register-link p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .register-link a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            .login-title {
                font-size: 28px;
            }
            .logo-pulse {
                font-size: 48px;
            }
            .header-actions {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Анимированные частицы -->
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="header-actions">
            <form action="/set_language" method="post" style="display: inline;">
                <input type="hidden" name="language" value="{{ 'en' if get_lang(request) == 'ru' else 'ru' }}">
                <button type="submit" class="lang-toggle">
                    <span>🌐</span>
                    <span>{{ 'Русский' if get_lang(request) == 'en' else 'English' }}</span>
                </button>
            </form>
            <button onclick="toggleTheme()" class="theme-toggle">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">
                    {% if get_lang(request) == 'en' %}Dark theme{% else %}Темная тема{% endif %}
                </span>
            </button>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script>
        // Создание анимированных частиц
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 8 + 4;
                const left = Math.random() * 100;
                const duration = Math.random() * 10 + 8;
                const delay = Math.random() * 15;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Переключение темы
        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.contains('light-theme');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            const lang = document.documentElement.lang || 'ru';
            
            if (isLight) {
                body.classList.remove('light-theme');
                localStorage.setItem('theme', 'dark');
                if (themeIcon) themeIcon.textContent = '🌙';
                if (themeText) themeText.textContent = lang === 'en' ? 'Dark theme' : 'Темная тема';
            } else {
                body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
                if (themeIcon) themeIcon.textContent = '☀️';
                if (themeText) themeText.textContent = lang === 'en' ? 'Light theme' : 'Светлая тема';
            }
        }
        
        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            const lang = document.documentElement.lang || 'ru';
            if (themeIcon) themeIcon.textContent = '☀️';
            if (themeText) themeText.textContent = lang === 'en' ? 'Light theme' : 'Светлая тема';
        }
        
        // Запуск частиц
        createParticles();
        
        window.toggleTheme = toggleTheme;
    </script>
</body>
</html>
